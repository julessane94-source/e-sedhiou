<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <!-- Drapeau du Sénégal -->
  
  <!-- Bande vert (haut) -->
  <rect width="900" height="200" fill="#007A5E"/>
  
  <!-- Bande jaune/or (milieu) -->
  <rect y="200" width="900" height="200" fill="#FCED00"/>
  
  <!-- Bande rouge (bas) -->
  <rect y="400" width="900" height="200" fill="#CE1126"/>
  
  <!-- Étoile verte au centre -->
  <g transform="translate(450, 300)">
    <polygon points="0,-80 24,-24 80,-24 37,20 60,76 0,32 -60,76 -37,20 -80,-24 -24,-24" fill="#007A5E"/>
  </g>
</svg>